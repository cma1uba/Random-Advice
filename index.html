<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Advice generator app</title>

</head>
<body>
   <div class="container">
       <div class="advice-card">
        <p id="advice-id"></p>
        <blockquote id="advice-text">Click the button for advice...</blockquote>
        <button id="advice-btn"><img src="images/icon-dice.svg" alt="image button"></button>
        <div class="divider-container">
            <img class="divider" src="images/pattern-divider-mobile.svg" alt="divider image">
        </div>
        </div>
    </div>
  
  <script src="script.js"></script>
</body>
</html>
